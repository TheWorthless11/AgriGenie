<svg width="400" height="300" xmlns="http://www.w3.org/2000/svg">
  <!-- Background -->
  <rect width="400" height="300" fill="#e8f5e9"/>
  
  <!-- Sky -->
  <rect width="400" height="180" fill="#87ceeb"/>
  
  <!-- Sun -->
  <circle cx="350" cy="40" r="30" fill="#ffd700"/>
  
  <!-- Farm Field -->
  <ellipse cx="200" cy="220" rx="180" ry="60" fill="#90ee90"/>
  
  <!-- Crops/Plants -->
  <g id="plant" opacity="0.7">
    <line x1="100" y1="220" x2="100" y2="160" stroke="#228b22" stroke-width="3"/>
    <path d="M 80 190 Q 100 160 120 190" fill="none" stroke="#228b22" stroke-width="2"/>
  </g>
  
  <use href="#plant" x="60" y="0"/>
  <use href="#plant" x="120" y="0"/>
  <use href="#plant" x="180" y="0"/>
  <use href="#plant" x="240" y="0"/>
  
  <!-- Text overlay -->
  <text x="200" y="280" font-size="18" font-weight="bold" fill="#228b22" text-anchor="middle" font-family="Arial">AgriGenie Farm</text>
</svg>
