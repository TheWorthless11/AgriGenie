services:
  db:
    image: postgres:16-alpine
    container_name: agrigenie-db
    restart: unless-stopped
    environment:
      POSTGRES_DB: agrigenie_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "${DB_PORT:-5432}:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d agrigenie_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  redis:
    image: redis:7-alpine
    container_name: agrigenie-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    volumes:
      - redis_data:/data
    ports:
      - "${REDIS_PORT:-6379}:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: agrigenie-web:latest
    container_name: agrigenie-web
    restart: unless-stopped
    command: >
      sh -c "python manage.py migrate &&
             python manage.py collectstatic --noinput &&
             daphne -b 0.0.0.0 -p 8000 asgi:application"
    env_file:
      - .env
    environment:
      DOTENV_OVERRIDE: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
      ALLOWED_HOSTS: ${ALLOWED_HOSTS:-localhost,127.0.0.1,web,.trycloudflare.com}
      CSRF_TRUSTED_ORIGINS: ${CSRF_TRUSTED_ORIGINS:-https://*.trycloudflare.com}
      TRUST_X_FORWARDED_PROTO: ${TRUST_X_FORWARDED_PROTO:-True}
      USE_X_FORWARDED_HOST: ${USE_X_FORWARDED_HOST:-True}
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    ports:
      - "${APP_PORT:-8000}:8000"
    volumes:
      - static_data:/app/staticfiles
      - media_data:/app/media

  celery_worker:
    build:
      context: .
      dockerfile: Dockerfile
    image: agrigenie-web:latest
    container_name: agrigenie-celery-worker
    restart: unless-stopped
    command: celery -A celery_config worker -l info
    env_file:
      - .env
    environment:
      DOTENV_OVERRIDE: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media

  celery_beat:
    build:
      context: .
      dockerfile: Dockerfile
    image: agrigenie-web:latest
    container_name: agrigenie-celery-beat
    restart: unless-stopped
    command: celery -A celery_config beat -l info --scheduler django_celery_beat.schedulers:DatabaseScheduler
    env_file:
      - .env
    environment:
      DOTENV_OVERRIDE: "False"
      DB_ENGINE: django.db.backends.postgresql
      DB_HOST: db
      DB_PORT: 5432
      REDIS_HOST: redis
      REDIS_PORT: 6379
      CELERY_BROKER_URL: redis://redis:6379/0
      CELERY_RESULT_BACKEND: redis://redis:6379/0
      CACHE_URL: redis://redis:6379/1
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - media_data:/app/media

volumes:
  postgres_data:
  redis_data:
  static_data:
  media_data:
