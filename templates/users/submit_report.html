{% extends 'base.html' %}
{% load static %}

{% block title %}Submit a Report - AgriGenie{% endblock %}

{% block content %}
<div class="container py-4">
    <div class="row justify-content-center">
        <div class="col-md-8">
            <div class="d-flex justify-content-between align-items-center mb-4">
                <div>
                    <h1 class="fw-bold">
                        <i class="fas fa-flag text-warning"></i> Submit a Report
                    </h1>
                    <p class="text-muted">Help us improve by reporting bugs, giving feedback, or making suggestions</p>
                </div>
                <a href="{% url 'my_reports' %}" class="btn btn-outline-success">
                    <i class="fas fa-list"></i> My Reports
                </a>
            </div>

            <div class="card border-0 shadow-sm">
                <div class="card-body p-4">
                    <form method="post">
                        {% csrf_token %}
                        <div class="row">
                            <div class="col-md-6 mb-3">
                                <label for="report_type" class="form-label fw-bold">Report Type <span class="text-danger">*</span></label>
                                <select class="form-select" id="report_type" name="report_type" required>
                                    <option value="">-- Select Type --</option>
                                    {% for value, label in report_types %}
                                        <option value="{{ value }}">{{ label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                            <div class="col-md-6 mb-3">
                                <label for="priority" class="form-label fw-bold">Priority</label>
                                <select class="form-select" id="priority" name="priority">
                                    {% for value, label in priority_choices %}
                                        <option value="{{ value }}" {% if value == 'medium' %}selected{% endif %}>{{ label }}</option>
                                    {% endfor %}
                                </select>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label for="subject" class="form-label fw-bold">Subject <span class="text-danger">*</span></label>
                            <input type="text" class="form-control" id="subject" name="subject" required placeholder="Brief summary of your report" maxlength="255">
                        </div>
                        <div class="mb-3">
                            <label for="description" class="form-label fw-bold">Description <span class="text-danger">*</span></label>
                            <textarea class="form-control" id="description" name="description" rows="6" required placeholder="Please describe in detail..."></textarea>
                        </div>
                        <div class="d-flex justify-content-between">
                            <a href="{% url 'dashboard' %}" class="btn btn-outline-secondary">
                                <i class="fas fa-arrow-left"></i> Cancel
                            </a>
                            <button type="submit" class="btn btn-success">
                                <i class="fas fa-paper-plane"></i> Submit Report
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </div>
</div>
{% endblock %}
