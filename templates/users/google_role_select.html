{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Choose Your Role - AgriGenie</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: { extend: { colors: { primary: '#28a745', 'primary-dark': '#1e7e34' } } }
        }
    </script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        .role-card { transition: all 0.2s ease; cursor: pointer; }
        .role-card:has(input:checked) { border-color: #28a745; background: #f0fdf4; }
        .role-card input:checked + div { color: #28a745; }
        .fade-in { animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity:0; transform:translateY(-12px); } to { opacity:1; transform:translateY(0); } }
    </style>
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center px-4">

    <div class="w-full max-w-md fade-in">
        <!-- Card -->
        <div class="bg-white rounded-3xl shadow-2xl shadow-slate-200/50 overflow-hidden">

            <!-- Header -->
            <div class="bg-primary px-6 py-8 text-center">
                <div class="w-16 h-16 bg-white/20 rounded-full flex items-center justify-center mx-auto mb-4">
                    <i data-lucide="user-check" class="w-8 h-8 text-white"></i>
                </div>
                <h1 class="text-2xl font-bold text-white">Welcome to AgriGenie!</h1>
                <p class="text-white/80 text-sm mt-1">One last step — tell us who you are</p>
            </div>

            <!-- Body -->
            <div class="p-6">
                <!-- Google account info -->
                <div class="bg-slate-50 rounded-xl p-4 mb-6 flex items-center gap-3">
                    <div class="w-10 h-10 bg-primary/10 rounded-full flex items-center justify-center flex-shrink-0">
                        <i data-lucide="mail" class="w-5 h-5 text-primary"></i>
                    </div>
                    <div>
                        <p class="text-xs text-slate-500">Signed in with Google as</p>
                        <p class="text-sm font-semibold text-slate-700">{{ request.user.email }}</p>
                    </div>
                </div>

                {% if error %}
                <div class="bg-red-50 border border-red-200 text-red-700 px-4 py-3 rounded-xl text-sm mb-4 flex items-center gap-2">
                    <i data-lucide="alert-circle" class="w-4 h-4"></i>
                    {{ error }}
                </div>
                {% endif %}

                <p class="text-sm font-semibold text-slate-700 mb-4 text-center">I want to join AgriGenie as a:</p>

                <form method="post">
                    {% csrf_token %}

                    <div class="grid grid-cols-2 gap-4 mb-6">
                        <!-- Farmer -->
                        <label class="role-card border-2 border-slate-200 rounded-2xl p-5 flex flex-col items-center gap-3">
                            <input type="radio" name="role" value="farmer" class="sr-only" required>
                            <div class="w-14 h-14 bg-green-100 rounded-full flex items-center justify-center">
                                <i data-lucide="tractor" class="w-7 h-7 text-primary"></i>
                            </div>
                            <div class="text-center">
                                <p class="font-bold text-slate-800 text-sm">Farmer</p>
                                <p class="text-xs text-slate-500 mt-1">Sell crops & manage your farm</p>
                            </div>
                        </label>

                        <!-- Buyer -->
                        <label class="role-card border-2 border-slate-200 rounded-2xl p-5 flex flex-col items-center gap-3">
                            <input type="radio" name="role" value="buyer" class="sr-only" required>
                            <div class="w-14 h-14 bg-blue-100 rounded-full flex items-center justify-center">
                                <i data-lucide="shopping-bag" class="w-7 h-7 text-blue-500"></i>
                            </div>
                            <div class="text-center">
                                <p class="font-bold text-slate-800 text-sm">Buyer</p>
                                <p class="text-xs text-slate-500 mt-1">Browse & purchase fresh crops</p>
                            </div>
                        </label>
                    </div>

                    <button type="submit" id="continueBtn"
                            class="w-full bg-primary hover:bg-primary-dark text-white font-bold py-3 px-6
                                   rounded-2xl shadow-lg shadow-primary/30 transition-all duration-300
                                   flex items-center justify-center gap-2">
                        <i data-lucide="arrow-right" class="w-5 h-5"></i>
                        Continue to AgriGenie
                    </button>
                </form>
            </div>
        </div>
    </div>

    <script>
        lucide.createIcons();

        // Highlight selected card
        document.querySelectorAll('input[name="role"]').forEach(input => {
            input.addEventListener('change', () => {
                document.querySelectorAll('.role-card').forEach(card => {
                    card.classList.remove('border-primary', 'bg-green-50');
                });
                input.closest('.role-card').classList.add('border-primary', 'bg-green-50');
            });
        });
    </script>
</body>
</html>
